<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华容道 - 经典滑块游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @keyframes slide {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes win {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .tile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .tile:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .tile:active {
            transform: scale(0.98);
        }
        
        .tile-empty {
            background: rgba(102, 126, 234, 0.1);
            border: 2px dashed rgba(102, 126, 234, 0.3);
            box-shadow: none;
        }
        
        .tile-new {
            animation: slide 0.3s ease-out;
        }
        
        .game-board {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 16px;
            padding: 12px;
            border: 2px solid rgba(102, 126, 234, 0.2);
        }
        
        .win-animation .tile:not(.tile-empty) {
            animation: win 0.5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 min-h-screen p-4 md:p-8">
    <div class="container mx-auto max-w-lg">
        <!-- 标题 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-2">
                <i class="fa fa-th-large text-purple-400 mr-2"></i>华容道
            </h1>
            <p class="text-gray-400">滑动数字，排列整齐！</p>
        </header>

        <!-- 游戏信息 -->
        <div class="flex justify-center gap-4 mb-6">
            <div class="bg-white/10 backdrop-blur rounded-xl px-6 py-3 text-center border border-purple-400/20">
                <div class="text-sm text-gray-400">步数</div>
                <div id="moves" class="text-2xl font-bold text-purple-400">0</div>
            </div>
            <div class="bg-white/10 backdrop-blur rounded-xl px-6 py-3 text-center border border-purple-400/20">
                <div class="text-sm text-gray-400">用时</div>
                <div id="timer" class="text-2xl font-bold text-pink-400">00:00</div>
            </div>
            <div class="bg-white/10 backdrop-blur rounded-xl px-6 py-3 text-center border border-purple-400/20">
                <div class="text-sm text-gray-400">最佳</div>
                <div id="best" class="text-2xl font-bold text-emerald-400">-</div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="flex justify-center mb-6">
            <div id="game-board" class="game-board grid grid-cols-4 gap-2 w-[320px] md:w-[400px]">
                <!-- 数字块会通过JS生成 -->
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="flex justify-center gap-4 mb-6 flex-wrap">
            <button id="new-game-btn" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg hover:shadow-purple-500/30 transition-all duration-300 hover:-translate-y-1">
                <i class="fa fa-refresh mr-2"></i>新游戏
            </button>
            <select id="difficulty-select" class="bg-white/10 text-white px-6 py-3 rounded-xl border border-purple-400/30 hover:border-purple-400 transition-all">
                <option value="3" class="bg-slate-800">3×3 简单</option>
                <option value="4" selected class="bg-slate-800">4×4 普通</option>
                <option value="5" class="bg-slate-800">5×5 困难</option>
            </select>
        </div>

        <!-- 提示 -->
        <div class="bg-white/5 backdrop-blur rounded-xl p-6 border border-purple-400/10 mb-6">
            <h3 class="font-bold text-purple-400 mb-3"><i class="fa fa-lightbulb-o mr-2"></i>游戏规则</h3>
            <ul class="text-gray-400 space-y-2 text-sm">
                <li>• 点击数字块滑动到空白位置</li>
                <li>• 目标是将所有数字按顺序排列</li>
                <li>• 空格在右下角</li>
                <li>• 尝试用最少的步数完成！</li>
            </ul>
        </div>

        <!-- 移动端控制 -->
        <div class="md:hidden">
            <div class="flex justify-center mb-4">
                <button id="hint-btn" class="bg-white/10 text-purple-300 px-6 py-2 rounded-lg border border-purple-400/30 hover:bg-purple-500/30 transition-all text-sm">
                    <i class="fa fa-magic mr-1"></i>提示下一步
                </button>
            </div>
        </div>
    </div>

    <!-- 胜利弹窗 -->
    <div id="win-modal" class="fixed inset-0 bg-black/70 backdrop-blur flex items-center justify-center z-50 hidden">
        <div class="bg-gradient-to-br from-purple-900 to-pink-900 rounded-2xl p-8 max-w-md mx-4 text-center border border-purple-400/30 shadow-2xl">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-white mb-4">恭喜过关！</h2>
            <div class="space-y-3 text-gray-300 mb-6">
                <p>用了 <span id="final-moves" class="text-purple-400 font-bold">0</span> 步</p>
                <p>用时: <span id="final-time" class="text-pink-400 font-bold">00:00</span></p>
                <p id="new-record" class="text-emerald-400 font-bold hidden">🎊 新纪录！</p>
            </div>
            <button id="play-again-btn" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all duration-300">
                <i class="fa fa-play mr-2"></i>再玩一次
            </button>
        </div>
    </div>

    <script>
        // 游戏状态
        let board = [];
        let size = 4;
        let moves = 0;
        let seconds = 0;
        let timerInterval = null;
        let startTime = null;
        let bestMoves = localStorage.getItem('huarong-best') || null;

        // 初始化
        function init() {
            size = parseInt(document.getElementById('difficulty-select').value);
            moves = 0;
            seconds = 0;
            startTime = null;
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // 生成已解决的板
            board = [];
            let num = 1;
            for (let i = 0; i < size; i++) {
                board[i] = [];
                for (let j = 0; j < size; j++) {
                    if (i === size - 1 && j === size - 1) {
                        board[i][j] = 0; // 空白
                    } else {
                        board[i][j] = num++;
                    }
                }
            }
            
            // 打乱（确保可解）
            shuffle();
            
            updateDisplay();
            renderBoard();
        }

        // 打乱（通过多次随机移动来确保可解）
        function shuffle() {
            const moves = size * size * 20;
            for (let i = 0; i < moves; i++) {
                const empty = findEmpty();
                const neighbors = getNeighbors(empty.row, empty.col);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [board[empty.row][empty.col], board[randomNeighbor.row][randomNeighbor.col]] = 
                [board[randomNeighbor.row][randomNeighbor.col], board[empty.row][empty.col]];
            }
        }

        // 找空白位置
        function findEmpty() {
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (board[i][j] === 0) {
                        return { row: i, col: j };
                    }
                }
            }
        }

        // 获取相邻位置
        function getNeighbors(row, col) {
            const neighbors = [];
            if (row > 0) neighbors.push({ row: row - 1, col: col });
            if (row < size - 1) neighbors.push({ row: row + 1, col: col });
            if (col > 0) neighbors.push({ row: row, col: col - 1 });
            if (col < size - 1) neighbors.push({ row: row, col: col + 1 });
            return neighbors;
        }

        // 点击数字块
        function clickTile(row, col) {
            const value = board[row][col];
            if (value === 0) return;
            
            const empty = findEmpty();
            const neighbors = getNeighbors(row, col);
            
            // 检查是否可以移动
            const canMove = neighbors.some(n => n.row === empty.row && n.col === empty.col);
            
            if (canMove) {
                // 开始计时
                if (!startTime) {
                    startTime = Date.now();
                    timerInterval = setInterval(updateTimer, 1000);
                }
                
                // 交换
                board[empty.row][empty.col] = value;
                board[row][col] = 0;
                
                moves++;
                updateDisplay();
                renderBoard();
                
                // 检查是否完成
                if (checkWin()) {
                    gameWin();
                }
            }
        }

        // 检查是否完成
        function checkWin() {
            let num = 1;
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (i === size - 1 && j === size - 1) {
                        if (board[i][j] !== 0) return false;
                    } else {
                        if (board[i][j] !== num++) return false;
                    }
                }
            }
            return true;
        }

        // 提示下一步
        function hint() {
            const solution = solve();
            if (solution) {
                const [row, col] = solution;
                const tile = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                if (tile) {
                    tile.style.animation = 'none';
                    tile.offsetHeight; // 触发重绘
                    tile.style.animation = 'win 0.5s ease-in-out 3';
                }
            }
        }

        // 简单求解（只提示第一个可移动的正确位置）
        function solve() {
            let num = 1;
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    if (i === size - 1 && j === size - 1) continue;
                    if (board[i][j] !== num) {
                        // 找到正确位置
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                if (board[r][c] === num) {
                                    const empty = findEmpty();
                                    const neighbors = getNeighbors(r, c);
                                    if (neighbors.some(n => n.row === empty.row && n.col === empty.col)) {
                                        return [r, c];
                                    }
                                }
                            }
                        }
                    }
                    num++;
                }
            }
            return null;
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('best').textContent = bestMoves ? bestMoves : '-';
        }

        // 更新时间
        function updateTimer() {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }

        // 渲染游戏板
        function renderBoard() {
            const gameBoard = document.getElementById('game-board');
            gameBoard.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'aspect-square flex items-center justify-center text-xl md:text-2xl font-bold';
                    tile.dataset.row = i;
                    tile.dataset.col = j;
                    
                    if (board[i][j] === 0) {
                        tile.classList.add('tile-empty');
                    } else {
                        tile.classList.add('tile');
                        tile.textContent = board[i][j];
                        tile.addEventListener('click', () => clickTile(i, j));
                    }
                    
                    gameBoard.appendChild(tile);
                }
            }
        }

        // 游戏胜利
        function gameWin() {
            clearInterval(timerInterval);
            
            // 检查是否是新纪录
            const isNewRecord = !bestMoves || moves < parseInt(bestMoves);
            if (isNewRecord) {
                bestMoves = moves;
                localStorage.setItem('huarong-best', bestMoves);
                updateDisplay();
            }
            
            document.getElementById('final-moves').textContent = moves;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('final-time').textContent = `${mins}:${secs}`;
            document.getElementById('new-record').classList.toggle('hidden', !isNewRecord);
            document.getElementById('win-modal').classList.remove('hidden');
            
            document.querySelector('.game-board').classList.add('win-animation');
        }

        // 事件监听
        document.getElementById('new-game-btn').addEventListener('click', () => {
            document.querySelector('.game-board').classList.remove('win-animation');
            init();
        });

        document.getElementById('difficulty-select').addEventListener('change', () => {
            document.querySelector('.game-board').classList.remove('win-animation');
            init();
        });

        document.getElementById('play-again-btn').addEventListener('click', () => {
            document.getElementById('win-modal').classList.add('hidden');
            document.querySelector('.game-board').classList.remove('win-animation');
            init();
        });

        document.getElementById('hint-btn')?.addEventListener('click', hint);

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('win-modal').classList.contains('hidden')) {
                const empty = findEmpty();
                switch (e.key) {
                    case 'ArrowUp':
                        if (empty.row < size - 1) clickTile(empty.row + 1, empty.col);
                        break;
                    case 'ArrowDown':
                        if (empty.row > 0) clickTile(empty.row - 1, empty.col);
                        break;
                    case 'ArrowLeft':
                        if (empty.col < size - 1) clickTile(empty.row, empty.col + 1);
                        break;
                    case 'ArrowRight':
                        if (empty.col > 0) clickTile(empty.row, empty.col - 1);
                        break;
                }
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
