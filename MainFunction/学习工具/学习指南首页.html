<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习资料指南 - Excel表格阅读器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e6e6e6;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 20px;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
            perspective: 1500px;
            transform-style: preserve-3d;
        }
        
        /* 左侧导航栏样式 */
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6),
                        inset 0 0 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            transform: translateZ(20px);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        
        .sidebar:hover {
            transform: translateZ(30px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7),
                        inset 0 0 30px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }
        
        .logo h1 {
            font-size: 1.6rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            font-weight: 700;
        }
        
        .logo p {
            font-size: 0.85rem;
            color: #8a8a9e;
        }
        
        .config-info {
            background: rgba(0, 210, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #00d2ff;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.15);
        }
        
        .config-info h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #00d2ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-info p {
            font-size: 0.85rem;
            color: #c4c4d4;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .sheet-list h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #8a8a9e;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 5px;
        }
        
        .sheet-list h3 i {
            color: #00d2ff;
        }
        
        .sheet-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            padding-left: 5px;
        }
        
        .sheet-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid transparent;
            transform: translateZ(0);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }
        
        .sheet-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #00d2ff, transparent);
            transform: scaleX(0);
            transition: transform 0.35s ease;
        }
        
        .sheet-item:hover::before {
            transform: scaleX(1);
        }
        
        .sheet-item:hover {
            background: rgba(0, 210, 255, 0.12);
            transform: translateX(8px) translateZ(5px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.25);
            border-left-color: #00d2ff;
        }
        
        .sheet-item.active {
            background: rgba(0, 210, 255, 0.18);
            border-left: 4px solid #00d2ff;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.35);
            transform: translateZ(10px);
        }
        
        .sheet-item.hidden {
            opacity: 0.5;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .sheet-item.hidden .sheet-icon {
            background: rgba(80, 80, 100, 0.2);
            color: #6a6a7e;
        }
        
        .sheet-icon {
            width: 42px;
            height: 42px;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d2ff;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        
        .sheet-item:hover .sheet-icon {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        
        .sheet-info h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .sheet-info p {
            font-size: 0.78rem;
            color: #7a7a8e;
        }
        
        /* 右侧主内容区样式 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateZ(30px);
            transform-style: preserve-3d;
        }
        
        .header {
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6),
                        inset 0 0 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: translateZ(15px);
            transition: transform 0.3s ease;
        }
        
        .header:hover {
            transform: translateZ(20px);
        }
        
        .header h2 {
            font-size: 1.7rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            font-weight: 700;
        }
        
        .sheet-stats {
            display: flex;
            gap: 22px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 24px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.15);
            transform: translateZ(5px);
            transition: all 0.3s ease;
            min-width: 80px;
        }
        
        .stat:hover {
            transform: translateY(-3px) translateZ(8px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.25);
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #8a8a9e;
            margin-top: 4px;
        }
        
        .table-container {
            flex: 1;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6),
                        inset 0 0 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-x: auto;
            overflow-y: auto;
            scrollbar-width: thin;
            position: relative;
            transform: translateZ(5px);
            max-height: calc(100vh - 220px);
        }
        
        /* 右侧渐变遮罩 */
        .table-container::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 100%;
            background: linear-gradient(to left, rgba(20, 20, 40, 0.95), transparent);
            pointer-events: none;
            z-index: 30;
            opacity: 0.8;
        }
        
        .no-data {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #8a8a9e;
            text-align: center;
        }
        
        .no-data i {
            font-size: 5rem;
            margin-bottom: 25px;
            color: #00d2ff;
            opacity: 0.4;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        
        .no-data h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #e6e6e6;
        }
        
        .no-data p {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        /* 表格样式优化 */
        .excel-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5),
                        inset 0 0 15px rgba(0, 0, 0, 0.3);
            min-width: 900px;
            background: rgba(255, 255, 255, 0.02);
            transform: translateZ(0);
        }
        
        .excel-table thead {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .excel-table th,
        .excel-table td {
            position: relative;
            transform: translateZ(2px);
            transition: transform 0.25s ease, background 0.3s ease;
            word-break: break-word;
            white-space: pre-wrap;
            max-width: 200px;
            min-width: 90px;
        }
        
        .excel-table th {
            padding: 18px 16px;
            text-align: left;
            font-weight: 600;
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            background: rgba(0, 210, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 0.95rem;
        }
        
        .excel-table th:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .excel-table tbody tr {
            transition: all 0.35s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .excel-table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.04);
        }
        
        .excel-table tbody tr:hover {
            background: rgba(0, 210, 255, 0.08);
            transform: scale(1.002);
        }
        
        .excel-table tbody tr:hover td {
            transform: translateZ(8px);
        }
        
        .excel-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #d6d6e6;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }
        
        .excel-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .excel-table tbody tr.highlight-row {
            background: rgba(0, 210, 255, 0.12);
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1);
        }
        
        .excel-table .highlight-cell {
            background: rgba(0, 210, 255, 0.15);
            border-left: 3px solid #00d2ff;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
            }
            
            .table-container {
                max-height: calc(100vh - 350px);
            }
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .sheet-stats {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .stat {
                min-width: 70px;
                padding: 10px 16px;
            }
            
            .table-container {
                padding: 15px;
            }
            
            .excel-table {
                font-size: 0.85rem;
                min-width: 600px;
            }
            
            .excel-table th, .excel-table td {
                padding: 10px 8px;
                min-width: 70px;
            }
            
            .sidebar {
                padding: 20px;
            }
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            border: 2px solid rgba(20, 20, 40, 0.9);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00e5ff, #4a8be5);
        }
        
        /* 加载动画 */
        .loader {
            display: none;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 210, 255, 0.15);
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 0 auto;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            transform: translateZ(20px);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateZ(20px); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateZ(20px); }
        }
        
        .loading .loader {
            display: block;
        }
        
        .loading .table-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: rgba(0, 210, 255, 0.12);
            color: #00d2ff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
            transform: translateZ(0);
            font-size: 0.9rem;
        }
        
        .btn:hover {
            background: rgba(0, 210, 255, 0.2);
            transform: translateY(-3px) translateZ(5px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }
        
        .btn:active {
            transform: translateY(-1px) translateZ(3px);
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
        }
        
        .btn-primary:hover {
            background: linear-gradient(90deg, #00e5ff 0%, #4a8be5 100%);
            transform: translateY(-4px) translateZ(8px);
            box-shadow: 0 14px 30px rgba(0, 210, 255, 0.5);
        }
        
        /* 表格滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 15px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: #00d2ff;
            padding: 8px 14px;
            border-radius: 25px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            transform: translateZ(10px);
            animation: fadeInOut 3s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* 搜索框 */
        .search-box {
            margin-bottom: 15px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #e6e6e6;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6a6a7e;
        }
        
        /* 数据统计 */
        .data-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .data-stat {
            background: rgba(0, 210, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #8a8a9e;
        }
        
        .data-stat span {
            color: #00d2ff;
            font-weight: 600;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="logo">
                <h1><i class="fas fa-file-excel"></i> 学习资料指南</h1>
                <p>读取并显示Excel学习资料</p>
            </div>
            
            <div class="config-info">
                <h3><i class="fas fa-cog"></i> 当前配置</h3>
                <p><strong>Excel文件:</strong> <span id="config-filename">学习资料.xlsx</span></p>
                <p><strong>显示的工作表:</strong> <span id="config-sheets">全部</span></p>
            </div>
            
            <div class="sheet-list">
                <h3><i class="fas fa-list"></i> 工作表列表</h3>
                <div class="sheet-items" id="sheet-list">
                    <div class="no-data">
                        <i class="fas fa-table"></i>
                        <p>正在加载...</p>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="load-excel-btn">
                    <i class="fas fa-file-import"></i> 重新加载数据
                </button>
                <button class="btn" id="show-all-btn">
                    <i class="fas fa-eye"></i> 显示所有工作表
                </button>
                <button class="btn" id="refresh-btn">
                    <i class="fas fa-sync-alt"></i> 刷新数据
                </button>
            </div>
        </div>
        
        <!-- 右侧主内容区 -->
        <div class="main-content">
            <div class="header">
                <h2 id="current-sheet">请加载Excel文件</h2>
                <div class="sheet-stats">
                    <div class="stat">
                        <span class="stat-value" id="total-sheets">0</span>
                        <span class="stat-label">工作表</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="visible-sheets">0</span>
                        <span class="stat-label">显示中</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="total-rows">0</span>
                        <span class="stat-label">数据行</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="total-cols">0</span>
                        <span class="stat-label">列数</span>
                    </div>
                </div>
            </div>
            
            <div class="table-container" id="table-container">
                <div class="search-box" id="search-box" style="display: none;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索表格内容...">
                </div>
                
                <div class="data-stats" id="data-stats" style="display: none;">
                    <div class="data-stat"><span>筛选:</span>显示全部数据</div>
                    <div class="data-stat"><span>匹配:</span>0 条</div>
                </div>
                
                <div class="no-data">
                    <i class="fas fa-file-excel"></i>
                    <h3>未加载数据</h3>
                    <p>正在自动加载学习资料数据...</p>
                </div>
                
                <div class="loader"></div>
                
                <table class="excel-table" id="excel-table" style="display: none;">
                </table>
                
                <div class="scroll-hint" id="scroll-hint">
                    <i class="fas fa-arrows-alt-h"></i> 横向滚动查看更多
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        // 配置
        const excelFileName = "学习资料.xlsx";
        
        // 全局变量
        let workbook = null;
        let currentSheetName = '';
        let allSheets = [];
        let visibleSheets = [];
        let currentData = [];
        let filteredData = [];
        
        // DOM元素
        const loadExcelBtn = document.getElementById('load-excel-btn');
        const showAllBtn = document.getElementById('show-all-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const configFilenameElement = document.getElementById('config-filename');
        const configSheetsElement = document.getElementById('config-sheets');
        const sheetListContainer = document.getElementById('sheet-list');
        const currentSheetDisplay = document.getElementById('current-sheet');
        const totalSheetsElement = document.getElementById('total-sheets');
        const visibleSheetsElement = document.getElementById('visible-sheets');
        const totalRowsElement = document.getElementById('total-rows');
        const totalColsElement = document.getElementById('total-cols');
        const tableContainer = document.getElementById('table-container');
        const excelTable = document.getElementById('excel-table');
        const searchBox = document.getElementById('search-box');
        const searchInput = document.getElementById('search-input');
        const dataStats = document.getElementById('data-stats');
        const scrollHint = document.getElementById('scroll-hint');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            configFilenameElement.textContent = excelFileName;
            configSheetsElement.textContent = '全部工作表';
            
            loadExcelBtn.addEventListener('click', loadExcelFile);
            showAllBtn.addEventListener('click', showAllSheets);
            refreshBtn.addEventListener('click', loadExcelFile);
            searchInput.addEventListener('input', filterTable);
            
            setTimeout(() => {
                loadExcelFile();
            }, 500);
        });
        
        // 加载Excel文件
        async function loadExcelFile() {
            tableContainer.classList.add('loading');
            tableContainer.innerHTML = '<div class="loader"></div>';
            
            try {
                const response = await fetch(excelFileName);
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                const data = await response.arrayBuffer();
                processExcelData(data);
            } catch (error) {
                console.error('加载失败:', error);
                tableContainer.classList.remove('loading');
                tableContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>加载失败</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">请确保文件 "${excelFileName}" 与此HTML文件在同一目录下</p>
                        <button class="btn btn-primary" style="margin-top: 20px;" onclick="loadExcelFile()">
                            <i class="fas fa-refresh"></i> 重试
                        </button>
                    </div>
                `;
            }
        }
        
        // 处理Excel数据
        function processExcelData(data) {
            try {
                workbook = XLSX.read(data, { type: 'array' });
                allSheets = workbook.SheetNames;
                visibleSheets = [...allSheets];
                
                updateStats();
                generateSheetList();
                
                if (visibleSheets.length > 0) {
                    displaySheet(visibleSheets[0]);
                }
                
                tableContainer.classList.remove('loading');
            } catch (error) {
                console.error('解析失败:', error);
                tableContainer.classList.remove('loading');
                tableContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>解析失败</h3>
                        <p>无法读取Excel文件，请确保文件格式正确</p>
                    </div>
                `;
            }
        }
        
        // 更新统计信息
        function updateStats() {
            totalSheetsElement.textContent = allSheets.length;
            visibleSheetsElement.textContent = visibleSheets.length;
        }
        
        // 生成工作表列表
        function generateSheetList() {
            if (visibleSheets.length === 0) {
                sheetListContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>没有找到工作表</p>
                    </div>
                `;
                return;
            }
            
            sheetListContainer.innerHTML = '';
            
            allSheets.forEach((sheetName, index) => {
                const isVisible = visibleSheets.includes(sheetName);
                const isActive = sheetName === currentSheetName;
                
                const sheetItem = document.createElement('div');
                sheetItem.className = `sheet-item ${isActive ? 'active' : ''} ${!isVisible ? 'hidden' : ''}`;
                sheetItem.dataset.sheetName = sheetName;
                sheetItem.style.animationDelay = `${index * 50}ms`;
                
                sheetItem.innerHTML = `
                    <div class="sheet-icon">
                        <i class="fas fa-${!isVisible ? 'eye-slash' : 'table'}"></i>
                    </div>
                    <div class="sheet-info">
                        <h4>${sheetName}</h4>
                        <p>${!isVisible ? '已隐藏' : '点击切换'}</p>
                    </div>
                `;
                
                sheetItem.addEventListener('click', () => {
                    if (isVisible) {
                        displaySheet(sheetName);
                        updateActiveSheetInList(sheetName);
                    }
                });
                
                sheetListContainer.appendChild(sheetItem);
            });
        }
        
        // 更新活动工作表高亮
        function updateActiveSheetInList(sheetName) {
            document.querySelectorAll('.sheet-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.sheetName === sheetName) {
                    item.classList.add('active');
                }
            });
        }
        
        // 显示指定工作表
        function displaySheet(sheetName) {
            if (!workbook) return;
            
            try {
                const worksheet = workbook.Sheets[sheetName];
                currentData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
                
                if (currentData.length === 0) {
                    tableContainer.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-inbox"></i>
                            <h3>工作表为空</h3>
                            <p>工作表 "${sheetName}" 中没有数据</p>
                        </div>
                    `;
                    return;
                }
                
                // 显示搜索框和统计信息
                searchBox.style.display = 'block';
                dataStats.style.display = 'flex';
                document.querySelector('.data-stat:first-child span + span').textContent = '显示全部数据';
                document.querySelector('.data-stat:last-child span + span').textContent = `${currentData.length - 1} 条`;
                
                // 保存过滤后的数据
                filteredData = [...currentData];
                
                // 生成表格
                renderTable(filteredData);
                
                // 更新标题和统计
                currentSheetDisplay.textContent = sheetName;
                totalRowsElement.textContent = currentData.length - 1;
                totalColsElement.textContent = currentData[0]?.length || 0;
                currentSheetName = sheetName;
                
            } catch (error) {
                console.error('显示失败:', error);
                tableContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>显示失败</h3>
                        <p>无法显示工作表 "${sheetName}"</p>
                    </div>
                `;
            }
        }
        
        // 渲染表格
        function renderTable(data) {
            tableContainer.innerHTML = '';
            tableContainer.appendChild(searchBox);
            tableContainer.appendChild(dataStats);
            tableContainer.appendChild(excelTable);
            tableContainer.appendChild(scrollHint);
            
            excelTable.innerHTML = '';
            excelTable.style.display = 'table';
            
            // 生成表头
            const headerRow = document.createElement('tr');
            if (data.length > 0) {
                data[0].forEach((cell, colIndex) => {
                    const th = document.createElement('th');
                    th.textContent = formatCellContent(cell);
                    th.style.minWidth = `${Math.max(80, String(cell).length * 10)}px`;
                    headerRow.appendChild(th);
                });
            }
            const thead = document.createElement('thead');
            thead.appendChild(headerRow);
            excelTable.appendChild(thead);
            
            // 生成表体
            const tbody = document.createElement('tbody');
            for (let i = 1; i < data.length; i++) {
                const row = document.createElement('tr');
                row.dataset.rowIndex = i;
                
                data[i].forEach((cell, colIndex) => {
                    const td = document.createElement('td');
                    td.textContent = formatCellContent(cell);
                    
                    // 高亮处理特殊内容
                    if (String(cell).toLowerCase().includes('小蓝人')) {
                        td.classList.add('highlight-cell');
                        row.classList.add('highlight-row');
                    }
                    
                    row.appendChild(td);
                });
                
                tbody.appendChild(row);
            }
            excelTable.appendChild(tbody);
        }
        
        // 格式化单元格内容
        function formatCellContent(cell) {
            if (cell === null || cell === undefined) return '';
            if (typeof cell === 'number') {
                return cell.toLocaleString();
            }
            return String(cell);
        }
        
        // 表格搜索过滤
        function filterTable() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            
            if (!searchTerm) {
                filteredData = [...currentData];
                document.querySelector('.data-stat:first-child span + span').textContent = '显示全部数据';
            } else {
                filteredData = currentData.filter((row, rowIndex) => {
                    if (rowIndex === 0) return true; // 保留表头
                    return row.some(cell => 
                        String(cell).toLowerCase().includes(searchTerm)
                    );
                });
                document.querySelector('.data-stat:first-child span + span').textContent = `搜索: "${searchTerm}"`;
            }
            
            document.querySelector('.data-stat:last-child span + span').textContent = `${filteredData.length - 1} 条`;
            
            if (filteredData.length > 0) {
                renderTable(filteredData);
            } else {
                tableContainer.innerHTML = `
                    <div class="search-box" style="display: block;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="搜索表格内容..." value="${searchTerm}">
                    </div>
                    <div class="no-data">
                        <i class="fas fa-search"></i>
                        <h3>未找到匹配数据</h3>
                        <p>没有找到包含 "${searchTerm}" 的内容</p>
                    </div>
                `;
                document.getElementById('search-input').addEventListener('input', filterTable);
            }
        }
        
        // 显示所有工作表
        function showAllSheets() {
            visibleSheets = [...allSheets];
            configSheetsElement.textContent = '全部工作表';
            updateStats();
            generateSheetList();
            if (!visibleSheets.includes(currentSheetName) && visibleSheets.length > 0) {
                displaySheet(visibleSheets[0]);
            }
        }
        
        // 触摸设备检测
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (!isTouchDevice) {
            tableContainer.addEventListener('mouseenter', () => {
                scrollHint.style.display = 'flex';
            });
            
            tableContainer.addEventListener('mouseleave', () => {
                scrollHint.style.display = 'none';
            });
        } else {
            scrollHint.style.display = 'none';
        }
        
        // 拖拽滚动支持
        let isDragging = false;
        let startX, scrollLeft;
        
        tableContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - tableContainer.offsetLeft;
            scrollLeft = tableContainer.scrollLeft;
            tableContainer.style.cursor = 'grabbing';
        });
        
        tableContainer.addEventListener('mouseleave', () => {
            isDragging = false;
            tableContainer.style.cursor = 'default';
        });
        
        tableContainer.addEventListener('mouseup', () => {
            isDragging = false;
            tableContainer.style.cursor = 'default';
        });
        
        tableContainer.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - tableContainer.offsetLeft;
            const walk = (x - startX) * 1.5;
            tableContainer.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
