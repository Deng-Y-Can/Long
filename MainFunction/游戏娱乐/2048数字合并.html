<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 数字合并游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5CF6',
                        secondary: '#EC4899',
                        tile: {
                            2: '#eee4da',
                            4: '#ede0c8',
                            8: '#f2b179',
                            16: '#f59563',
                            32: '#f67c5f',
                            64: '#f65e3b',
                            128: '#edcf72',
                            256: '#edcc61',
                            512: '#edc850',
                            1024: '#edc53f',
                            2048: '#edc22e',
                            super: '#3c3a32'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.3); }
        .tile-256 { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4); }
        .tile-512 { background: #edc850; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5); }
        .tile-1024 { background: #edc53f; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.6); font-size: 2rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.8); font-size: 2rem; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.5rem; }
        
        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .tile-new {
            animation: pop 0.2s ease-in-out;
        }
        
        @keyframes slide {
            0% { transform: translateX(-100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        
        .tile-slide {
            animation: slide 0.15s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-violet-50 to-pink-50 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-lg">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
                <i class="fa fa-th text-purple-600 mr-2"></i>2048
            </h1>
            <p class="text-gray-600">合并数字，挑战2048！</p>
        </header>

        <!-- 分数面板 -->
        <div class="flex justify-center gap-4 mb-6">
            <div class="bg-white rounded-xl px-6 py-3 shadow-lg">
                <div class="text-sm text-gray-500">当前分数</div>
                <div id="score" class="text-2xl font-bold text-purple-600">0</div>
            </div>
            <div class="bg-white rounded-xl px-6 py-3 shadow-lg">
                <div class="text-sm text-gray-500">最高分数</div>
                <div id="best-score" class="text-2xl font-bold text-pink-600">0</div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="bg-gradient-to-br from-amber-100 to-orange-100 rounded-2xl p-4 shadow-xl mb-6">
            <div id="game-board" class="grid grid-cols-4 gap-3 bg-amber-200 rounded-xl p-3">
                <!-- 4x4 格子会通过JS生成 -->
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="flex justify-center gap-4 mb-6">
            <button id="new-game-btn" class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition-all duration-300 hover:-translate-y-1">
                <i class="fa fa-refresh mr-2"></i>新游戏
            </button>
            <button id="undo-btn" class="bg-white text-purple-600 px-6 py-3 rounded-xl font-semibold border-2 border-purple-200 hover:border-purple-400 transition-all duration-300">
                <i class="fa fa-undo mr-2"></i>撤销
            </button>
        </div>

        <!-- 说明 -->
        <div class="bg-white/80 backdrop-blur rounded-xl p-6 shadow-lg">
            <h3 class="font-bold text-gray-700 mb-3"><i class="fa fa-info-circle text-purple-600 mr-2"></i>游戏规则</h3>
            <ul class="text-gray-600 space-y-2 text-sm">
                <li>• 使用 <kbd class="bg-gray-200 px-2 py-1 rounded">↑</kbd> <kbd class="bg-gray-200 px-2 py-1 rounded">↓</kbd> <kbd class="bg-gray-200 px-2 py-1 rounded">←</kbd> <kbd class="bg-gray-200 px-2 py-1 rounded">→</kbd> 方向键或滑动屏幕移动</li>
                <li>• 相同数字碰撞会合并成它们的和</li>
                <li>• 目标：得到 <span class="font-bold text-purple-600">2048</span>！</li>
            </ul>
        </div>
    </div>

    <script>
        // 游戏状态
        let grid = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('2048-best') || '0');
        let history = [];

        // 初始化游戏
        function init() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            history = [];
            addRandomTile();
            addRandomTile();
            updateDisplay();
            document.getElementById('best-score').textContent = bestScore;
        }

        // 添加随机方块
        function addRandomTile() {
            const empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) empty.push([i, j]);
                }
            }
            if (empty.length > 0) {
                const [i, j] = empty[Math.floor(Math.random() * empty.length)];
                grid[i][j] = Math.random() < 0.9 ? 2 : 4;
                return [i, j];
            }
            return null;
        }

        // 更新显示
        function updateDisplay(newTilePos = null) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    const value = grid[i][j];
                    
                    cell.className = `w-16 h-16 md:w-20 md:h-20 rounded-lg flex items-center justify-center font-bold text-xl md:text-2xl transition-all duration-150 ${value ? `tile-${Math.min(value, 2048)}` : 'bg-amber-100/50'}`;
                    
                    if (value) cell.textContent = value;
                    if (newTilePos && newTilePos[0] === i && newTilePos[1] === j) {
                        cell.classList.add('tile-new');
                    }
                    
                    board.appendChild(cell);
                }
            }
            
            document.getElementById('score').textContent = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048-best', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        // 保存历史状态
        function saveHistory() {
            history.push({
                grid: grid.map(row => [...row]),
                score: score
            });
            if (history.length > 10) history.shift();
        }

        // 撤销
        function undo() {
            if (history.length > 0) {
                const state = history.pop();
                grid = state.grid;
                score = state.score;
                updateDisplay();
            }
        }

        // 移动
        function move(direction) {
            saveHistory();
            let moved = false;
            
            const rotate = () => {
                const n = grid.length;
                const rotated = Array(n).fill(null).map(() => Array(n).fill(0));
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        rotated[j][n - 1 - i] = grid[i][j];
                    }
                }
                grid = rotated;
            };

            const slideLeft = () => {
                for (let i = 0; i < 4; i++) {
                    let row = grid[i].filter(x => x !== 0);
                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            score += row[j];
                            row.splice(j + 1, 1);
                            moved = true;
                        }
                    }
                    while (row.length < 4) row.push(0);
                    if (row.join(',') !== grid[i].join(',')) moved = true;
                    grid[i] = row;
                }
            };

            // 统一处理：旋转后向左滑动，再转回来
            const rotations = { left: 0, up: 1, right: 2, down: 3 };
            const times = rotations[direction];
            
            for (let i = 0; i < times; i++) rotate();
            slideLeft();
            for (let i = 0; i < (4 - times) % 4; i++) rotate();

            if (moved) {
                const newTile = addRandomTile();
                updateDisplay(newTile);
                
                // 检查游戏结束
                if (isGameOver()) {
                    setTimeout(() => alert('游戏结束！得分：' + score), 100);
                }
                
                // 检查胜利
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 2048) {
                            setTimeout(() => {
                                if (confirm('恭喜达到2048！是否继续？')) {
                                    // 继续游戏
                                } else {
                                    init();
                                }
                            }, 100);
                        }
                    }
                }
            }
        }

        // 检查游戏结束
        function isGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return false;
                    if (j < 3 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < 3 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        // 触摸控制
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            
            touchStartX = touchStartY = null;
        });

        // 按钮事件
        document.getElementById('new-game-btn').addEventListener('click', init);
        document.getElementById('undo-btn').addEventListener('click', undo);

        // 启动游戏
        init();
    </script>
</body>
</html>
